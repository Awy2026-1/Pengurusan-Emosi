<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 情感冒险 - 情绪管理游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-wrapper {
            width: 100%;
            max-width: 1200px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        #game-container {
            flex: 1;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
        }

        .info-box h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .info-box p {
            color: #555;
            line-height: 1.5;
            font-size: 0.95em;
        }

        .emotion-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .emotion-display h4 {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .emotion-icon {
            font-size: 3em;
            margin: 10px 0;
        }

        .emotion-name {
            font-size: 1.3em;
            font-weight: bold;
        }

        .emotion-level {
            margin-top: 10px;
            font-size: 0.9em;
            opacity: 0.9;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.3);
            height: 6px;
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-fill {
            background: white;
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }

        .padlet-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .padlet-section h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1em;
        }

        .padlet-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 0.9em;
            margin-bottom: 8px;
            font-family: Arial;
        }

        .padlet-btn {
            width: 100%;
            padding: 8px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
            font-size: 0.9em;
        }

        .padlet-btn:hover {
            background: #764ba2;
        }

        .padlet-posts {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .post-item {
            background: white;
            padding: 10px;
            border-radius: 5px;
            border-left: 3px solid #667eea;
            font-size: 0.85em;
            line-height: 1.4;
        }

        .post-item strong {
            color: #667eea;
        }

        .post-item .post-type {
            display: inline-block;
            background: #e8e8f8;
            color: #667eea;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.75em;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95em;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .footer {
            background: #f0f0f0;
            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 0.9em;
            border-top: 1px solid #ddd;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="header">
            <h1>🧠 情感冒险</h1>
            <p>通过有趣的游戏学会管理你的情绪！</p>
        </div>

        <div class="container">
            <div id="game-container"></div>

            <div class="sidebar">
                <div class="emotion-display">
                    <h4>当前情绪</h4>
                    <div class="emotion-icon" id="emotionIcon">😐</div>
                    <div class="emotion-name" id="emotionName">平静</div>
                    <div class="emotion-level">
                        强度: <span id="emotionLevel">5</span>/10
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="emotionProgress" style="width: 50%"></div>
                    </div>
                </div>

                <div class="info-box">
                    <h3>📖 游戏说明</h3>
                    <p id="gameInfo">欢迎来到情感冒险！点击"开始游戏"来识别和管理你的情绪。</p>
                </div>

                <div class="info-box">
                    <h3>⭐ 得分</h3>
                    <p>总分: <span id="score">0</span> 分</p>
                </div>

                <div class="padlet-section">
                    <h3>💬 留言板</h3>
                    <textarea class="padlet-input" id="padletInput" placeholder="分享你的想法..." rows="3"></textarea>
                    <button class="padlet-btn" onclick="submitPost()">发送</button>
                    <div class="padlet-posts" id="padletPosts"></div>
                </div>

                <div class="controls">
                    <button class="btn btn-primary" onclick="startGame()">开始游戏</button>
                    <button class="btn btn-secondary" onclick="resetGame()">重新开始</button>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>💡 提示：游戏可以帮助你更好地理解和管理自己的情绪。如果感到困扰，请寻求专业帮助。</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
    <script src="game.js"></script>
</body>
</html>
